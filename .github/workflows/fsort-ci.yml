name: fsort CI/CD

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

permissions:
  contents: write

jobs:
  build-and-test:
    name: Install and Test fsort
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tree (for verification)
        run: sudo apt-get install -y tree

      - name: Check essential files
        run: |
          tree -L 3
          [ -f install.sh ] || { echo "::error::[ERROR] Missing install.sh"; exit 1; }
          [ -f src/main.sh ] || { echo "::error::[ERROR] Missing src/main.sh"; exit 1; }
          [ -f version ] || { echo "::error::[ERROR] Missing version file"; exit 1; }

      - name: Install fsort
        run: |
          chmod +x install.sh
          ./install.sh

      - name: Verify installation
        run: |
          command -v fsort || { echo "::error::[ERROR] fsort not installed"; exit 1; }
          fsort version || { echo "::error::[ERROR] fsort execution issue"; exit 1; }

      - name: Install Python and pytest
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run tests
        run: pytest tests/

  release:
    name: Create release (master branch only)
    needs: build-and-test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        id: get_version
        run: |
          VERSION=$(cat version | tr -d '\n')
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Read version: ${VERSION}"

      - name: Prepare Debian package structure
        run: |
          mkdir -p "fsort_${{ steps.get_version.outputs.VERSION }}/DEBIAN"
          mkdir -p "fsort_${{ steps.get_version.outputs.VERSION }}/usr/local/bin"

          cat <<EOF > "fsort_${{ steps.get_version.outputs.VERSION }}/DEBIAN/control"
          Package: fsort
          Version: ${{ steps.get_version.outputs.VERSION }}
          Architecture: all
          Maintainer: Brandon <brandon@example.com>
          Description: Automated File Organizer
          Section: utils
          Priority: optional
          EOF

          cat <<EOF > "fsort_${{ steps.get_version.outputs.VERSION }}/DEBIAN/postinst"
          #!/bin/bash
          chmod +x /usr/local/bin/fsort
          chmod +x /usr/local/bin/fsort-uninstall
          echo 'fsort installed successfully!'
          EOF
          chmod 0755 "fsort_${{ steps.get_version.outputs.VERSION }}/DEBIAN/postinst"

          cat <<EOF > "fsort_${{ steps.get_version.outputs.VERSION }}/DEBIAN/prerm"
          #!/bin/bash
          echo '[INFO] Running uninstall...'
          fsort-uninstall || { echo "[ERROR] Uninstall failed"; exit 1; }
          echo '[SUCCESS] fsort removed successfully.'
          EOF
          chmod 0755 "fsort_${{ steps.get_version.outputs.VERSION }}/DEBIAN/prerm"

          cp src/main.sh "fsort_${{ steps.get_version.outputs.VERSION }}/usr/local/bin/fsort"
          cp install.sh "fsort_${{ steps.get_version.outputs.VERSION }}/usr/local/bin/fsort-install"

      - name: Build Debian package
        run: dpkg-deb --build "fsort_${{ steps.get_version.outputs.VERSION }}"

      - name: Create tar.gz package
        run: tar -czvf "fsort-${{ steps.get_version.outputs.VERSION }}.tar.gz" src/ install.sh version

      - name: Verify artifacts
        run: |
          ls -lh
          [ -f "fsort_${{ steps.get_version.outputs.VERSION }}.deb" ] || { echo "::error::Missing .deb file"; exit 1; }
          [ -f "fsort-${{ steps.get_version.outputs.VERSION }}.tar.gz" ] || { echo "::error::Missing .tar.gz file"; exit 1; }

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fsort-${{ steps.get_version.outputs.VERSION }}.tar.gz
            fsort_${{ steps.get_version.outputs.VERSION }}.deb
          tag_name: "v${{ steps.get_version.outputs.VERSION }}"
          name: "fsort v${{ steps.get_version.outputs.VERSION }}"
          body: "Version ${{ steps.get_version.outputs.VERSION }} - $(date +'%Y-%m-%d')"
          draft: false
          prerelease: false
